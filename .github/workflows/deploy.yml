name: Deploy Frontend

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Worker URL
        run: |
          sed -i "s|{{WORKER_URL}}|${{ secrets.WORKER_URL }}|g" frontend/app.js
          sed -i "s|{{WORKER_URL}}|${{ secrets.WORKER_URL }}|g" frontend/obs.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
